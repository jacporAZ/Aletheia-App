<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Aletheia — Marketing Hero</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html,body{margin:0;padding:0;font-family:Inter,system-ui,sans-serif;background:#0A0A0A;overflow-x:hidden;}
  .page{background:#1a1a1a;min-height:100vh;padding:40px 20px 80px;}
  .head{text-align:center;color:#bbb;margin-bottom:20px;font-size:13px;}
  .switch{display:flex;gap:8px;justify-content:center;margin-bottom:24px;}
  .switch button{padding:8px 16px;border-radius:999px;border:0.5px solid #333;background:#222;color:#bbb;font-size:12px;cursor:pointer;font-family:inherit;}
  .switch button.on{background:#1A6BB5;color:#fff;border-color:#1A6BB5;}

  /* The banner stage — scales 1920x1080 down to viewport */
  .stage-wrap{display:flex;justify-content:center;}
  .banner{
    width:1920px;height:1080px;position:relative;overflow:hidden;
    transform-origin:top center;
    background:
      radial-gradient(ellipse 80% 60% at 50% 100%, rgba(181,212,244,0.6) 0%, rgba(234,244,253,0) 70%),
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(133,183,235,0.35) 0%, rgba(242,248,254,0) 70%),
      linear-gradient(180deg, #F2F8FE 0%, #EAF4FD 70%, #B5D4F4 100%);
  }

  /* subtle grain */
  .grain{position:absolute;inset:0;pointer-events:none;opacity:0.4;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.05 0 0 0 0 0.27 0 0 0 0 0.49 0 0 0 0.06 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");}

  /* Caption */
  .caption{position:absolute;font-family:'JetBrains Mono',monospace;font-size:12px;color:#85B7EB;letter-spacing:0.08em;}

  /* ---- Phone styling ---- */
  .phone{
    position:absolute;width:390px;height:844px;border-radius:56px;
    background:#0A0A0A;padding:10px;box-sizing:border-box;
    box-shadow:
      0 0 0 2px rgba(255,255,255,0.1),
      0 40px 80px rgba(12,68,124,0.25),
      0 80px 160px rgba(12,68,124,0.18),
      0 10px 30px rgba(12,68,124,0.15);
  }
  .phone-screen{width:100%;height:100%;border-radius:46px;overflow:hidden;background:#F2F8FE;position:relative;}
  .notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:120px;height:34px;background:#0A0A0A;border-radius:20px;z-index:5;}

  /* Floating decor */
  .ring{position:absolute;border-radius:50%;border:1px solid rgba(26,107,181,0.25);}

</style>
</head>
<body>
<div class="page">
  <div class="head">1920 × 1080 · Website hero banner (shown scaled)</div>
  <div class="switch">
    <button id="v1" class="on">Variant 1 · Fanned layers</button>
    <button id="v2">Variant 2 · Overlap cascade</button>
  </div>
  <div class="stage-wrap">
    <div id="root"></div>
  </div>
</div>

<script type="text/babel">
// ───────────────────────────────────────────────────────────────
// Scale to viewport — the stage is always 1920x1080
// ───────────────────────────────────────────────────────────────
function useScaleToFit(targetWidth = 1920, margin = 40) {
  const [scale, setScale] = React.useState(1);
  React.useEffect(() => {
    const on = () => {
      const vw = window.innerWidth - margin * 2;
      setScale(Math.min(1, vw / targetWidth));
    };
    on();
    window.addEventListener('resize', on);
    return () => window.removeEventListener('resize', on);
  }, []);
  return scale;
}

// ───────────────────────────────────────────────────────────────
// Gradient photo placeholder
// ───────────────────────────────────────────────────────────────
function Photo({ seed, initial, height = '100%' }) {
  const grads = [
    'linear-gradient(135deg,#0C447C 0%,#378ADD 55%,#85B7EB 100%)',
    'linear-gradient(150deg,#185FA5 0%,#85B7EB 70%,#EAF4FD 100%)',
    'linear-gradient(120deg,#1A6BB5 0%,#85B7EB 50%,#B5D4F4 100%)',
    'linear-gradient(160deg,#0C447C 0%,#1A6BB5 70%,#378ADD 100%)',
  ];
  return (
    <div style={{ position:'relative', width:'100%', height, overflow:'hidden', background: grads[seed % grads.length] }}>
      <div style={{
        position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center',
        fontFamily:"'Geist',Inter,sans-serif", fontWeight:300, fontSize:180,
        color:'rgba(255,255,255,0.25)', letterSpacing:'0.05em',
      }}>{initial}</div>
    </div>
  );
}

// ───────────────────────────────────────────────────────────────
// SCREEN A — Discover hero profile card
// ───────────────────────────────────────────────────────────────
function ScreenDiscover({ name='Mira', age=28, city='Brooklyn', seed=0, verified=true }) {
  return (
    <div style={{ height:'100%', background:'#F2F8FE', paddingTop:54, boxSizing:'border-box' }}>
      {/* Header */}
      <div style={{ padding:'8px 16px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <span style={{ fontFamily:"'Geist',Inter", fontWeight:300, fontSize:17, letterSpacing:'0.32em', color:'#1A6BB5' }}>ALETHEIA</span>
        <div style={{
          padding:'5px 11px', borderRadius:999,
          background:'rgba(255,255,255,0.7)', border:'0.5px solid #B5D4F4',
          fontSize:11, color:'#185FA5', fontWeight:600, display:'flex', gap:5, alignItems:'center',
        }}>
          <i data-lucide="heart" style={{ width:11, height:11, color:'#1A6BB5' }}></i>
          3/10
        </div>
      </div>

      {/* Hero card */}
      <div style={{ margin:'12px 16px', borderRadius:24, overflow:'hidden', boxShadow:'0 12px 32px rgba(12,68,124,0.18)', position:'relative', height:460 }}>
        <Photo seed={seed} initial={name[0]} />
        {/* Active status */}
        <div style={{
          position:'absolute', top:14, left:14, padding:'5px 10px', borderRadius:999,
          background:'rgba(255,255,255,0.7)', backdropFilter:'blur(20px) saturate(140%)',
          WebkitBackdropFilter:'blur(20px) saturate(140%)', border:'0.5px solid rgba(255,255,255,0.8)',
          fontSize:10, fontWeight:600, color:'#0C447C', display:'flex', alignItems:'center', gap:5,
        }}>
          <span style={{ width:5, height:5, borderRadius:999, background:'#5DCAA5' }} />
          Active 2h ago
        </div>
        {/* Glass name bar */}
        <div style={{
          position:'absolute', left:14, right:14, bottom:14,
          background:'rgba(255,255,255,0.7)',
          backdropFilter:'blur(28px) saturate(140%)',

        }}>

            <div style={{ fontFamily:"'Geist',Inter", fontWeight:600, fontSize:20, color:'#0A0A0A', letterSpacing:'-0.01em' }}>{name}, {age}</div>

          }}>✓ Verified</span>}

      </div>

      {/* Reaction rail */}
      <div style={{ display:'flex', gap:10, justifyContent:'center', marginTop:14 }}>
        {['x','heart','video','user-plus'].map((ic,i) => (
          <div key={i} style={{

            background:'rgba(255,255,255,0.8)', backdropFilter:'blur(24px)',
            WebkitBackdropFilter:'blur(24px)', border:'0.5px solid rgba(255,255,255,0.9)',
            boxShadow:'0 8px 22px rgba(12,68,124,0.14), inset 0 1px 0 rgba(255,255,255,1)',
            display:'flex', alignItems:'center', justifyContent:'center', color:'#1A6BB5',
          }}><i data-lucide={ic} style={{ width:18, height:18 }}></i></div>
        ))}
      </div>

      {/* Basics */}
      <div style={{ padding:'18px 22px', color:'#185FA5', fontSize:13 }}>
        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          <i data-lucide="briefcase" style={{ width:13, height:13 }}></i>
          Sound designer · Pulse Radio
        </div>
      </div>

      {/* Prompt card peek */}
      <div style={{
        margin:'0 16px', background:'#fff', borderRadius:20, padding:16,
        border:'0.5px solid #B5D4F4', boxShadow:'0 2px 6px rgba(12,68,124,0.04)',
      }}>
        <div style={{ fontSize:10, fontWeight:600, letterSpacing:'0.1em', textTransform:'uppercase', color:'#85B7EB' }}>My simple pleasure</div>
        <div style={{ fontFamily:"'Geist',Inter", fontSize:19, fontWeight:500, color:'#0C447C', marginTop:6, letterSpacing:'-0.01em', lineHeight:1.25 }}>
          A bowl of soup on a Tuesday.
        </div>
      </div>
    </div>
  );
}

// ───────────────────────────────────────────────────────────────
// SCREEN B — Match moment
// ───────────────────────────────────────────────────────────────
function ScreenMatch({ name='Mira', seed=0 }) {
  return (
    <div style={{ height:'100%', position:'relative', overflow:'hidden' }}>
      {/* Dimmed blurred profile behind */}
      <div style={{ position:'absolute', inset:0, filter:'blur(18px)', transform:'scale(1.1)' }}>
        <Photo seed={seed} initial={name[0]} />
      </div>
      <div style={{ position:'absolute', inset:0, background:'rgba(12,68,124,0.45)' }} />

      {/* Card */}
      <div style={{
        position:'absolute', left:'50%', top:'50%', transform:'translate(-50%,-50%)',
        width:320, background:'rgba(255,255,255,0.9)',
        backdropFilter:'blur(40px) saturate(160%)', WebkitBackdropFilter:'blur(40px) saturate(160%)',
        border:'0.5px solid rgba(255,255,255,0.9)', borderRadius:28, overflow:'hidden',
        boxShadow:'0 40px 80px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,1)',
      }}>
        <div style={{ height:200, position:'relative' }}>
          <Photo seed={seed} initial={name[0]} />
          <div style={{ position:'absolute', inset:0, background:'linear-gradient(180deg,rgba(12,68,124,0) 30%,rgba(12,68,124,0.35) 100%)' }}/>
          <div style={{
            position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)',
            width:64, height:64, borderRadius:999, background:'rgba(255,255,255,0.95)',
            boxShadow:'0 14px 40px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,1)',
            display:'flex', alignItems:'center', justifyContent:'center', color:'#1A6BB5',
          }}><i data-lucide="heart" style={{ width:28, height:28 }}></i></div>
        </div>
        <div style={{ padding:'22px 24px', textAlign:'center' }}>
          <div style={{ fontFamily:"'Geist',Inter", fontSize:24, fontWeight:600, color:'#0C447C', letterSpacing:'-0.01em' }}>It's a match</div>
          <div style={{ fontSize:13, color:'#185FA5', marginTop:6, lineHeight:1.45 }}>
            You both said yes. Next step: a call to see if the vibe's real.
          </div>
          <div style={{
            marginTop:18, background:'#1A6BB5', color:'#fff',
            padding:'13px 20px', borderRadius:14, fontSize:14, fontWeight:600,
            boxShadow:'0 10px 24px rgba(26,107,181,0.3)',
          }}>Schedule a call</div>
          <div style={{ marginTop:10, color:'#85B7EB', fontSize:13, fontWeight:500 }}>Keep browsing</div>
        </div>
      </div>
    </div>
  );
}

// ───────────────────────────────────────────────────────────────
// SCREEN C — Video call
// ───────────────────────────────────────────────────────────────
function ScreenCall({ name='Mira', seed=0 }) {
  return (
    <div style={{ height:'100%', background:'#0C447C', position:'relative', overflow:'hidden' }}>
      <div style={{ position:'absolute', inset:0, background:'linear-gradient(160deg,#0C447C 0%,#185FA5 50%,#1A6BB5 100%)' }}>
        <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center',
          fontFamily:"'Geist',Inter", fontWeight:300, fontSize:140, color:'rgba(255,255,255,0.18)' }}>{name[0]}</div>
      </div>
      {/* PiP */}
      <div style={{
        position:'absolute', top:54, right:14, width:82, height:112, borderRadius:14,
        background:'linear-gradient(135deg,#185FA5,#85B7EB)', border:'1px solid rgba(255,255,255,0.3)',
      }}/>
      {/* Top pill */}
      <div style={{
        position:'absolute', top:54, left:14, padding:'7px 13px', borderRadius:999,
        background:'rgba(12,68,124,0.55)', backdropFilter:'blur(20px)', WebkitBackdropFilter:'blur(20px)',
        color:'#fff', fontSize:12, fontWeight:500, display:'flex', alignItems:'center', gap:7,
      }}>
        <span style={{ width:6, height:6, borderRadius:999, background:'#5DCAA5' }}/>
        {name} · 02:14
      </div>
      {/* HUD */}
      <div style={{
        position:'absolute', left:16, right:16, bottom:40,
        background:'rgba(255,255,255,0.18)',
        backdropFilter:'blur(28px) saturate(140%)', WebkitBackdropFilter:'blur(28px) saturate(140%)',
        border:'0.5px solid rgba(255,255,255,0.25)', borderRadius:28, padding:12,

        boxShadow:'0 12px 40px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.3)',
      }}>
        {[['mic','Mute'],['video','Video'],['rotate-ccw','Flip']].map(([ic,l]) => (
          <div key={ic} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:3, color:'#fff', fontSize:10 }}>
            <div style={{ width:42, height:42, borderRadius:999, background:'rgba(255,255,255,0.18)',
              display:'flex', alignItems:'center', justifyContent:'center' }}>
              <i data-lucide={ic} style={{ width:19, height:19 }}></i>
            </div>

          </div>
        ))}
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:3, color:'#fff', fontSize:10 }}>
          <div style={{ width:42, height:42, borderRadius:999, background:'#E5484D',
            display:'flex', alignItems:'center', justifyContent:'center' }}>
            <i data-lucide="phone-off" style={{ width:19, height:19 }}></i>
          </div>
          End
        </div>
      </div>
    </div>
  );
}

// ───────────────────────────────────────────────────────────────
// Phone wrapper
// ───────────────────────────────────────────────────────────────
function Phone({ style, children }) {
  return (
    <div className="phone" style={style}>
      <div className="phone-screen">
        <div className="notch" />
        {children}
      </div>
    </div>
  );
}

// ───────────────────────────────────────────────────────────────
// Floating brand decor elements
// ───────────────────────────────────────────────────────────────
function FloatingChip({ style, icon, children, color='#0C447C', absolute=true }) {
  return (
    <div style={{
      ...(absolute ? { position:'absolute' } : {}),
      display:'inline-flex', alignItems:'center', gap:8,
      padding:'10px 16px', borderRadius:999,
      background:'rgba(255,255,255,0.75)', backdropFilter:'blur(24px) saturate(160%)',
      WebkitBackdropFilter:'blur(24px) saturate(160%)', border:'0.5px solid rgba(255,255,255,0.9)',
      boxShadow:'0 12px 36px rgba(12,68,124,0.16), inset 0 1px 0 rgba(255,255,255,1)',
      color, fontSize:14, fontWeight:600, fontFamily:'Inter',
      ...style,
    }}>
      {icon && <i data-lucide={icon} style={{ width:16, height:16, color:'#1A6BB5' }}></i>}
      {children}
    </div>
  );
}

// ───────────────────────────────────────────────────────────────

        }}>

    </div>

}

// ───────────────────────────────────────────────────────────────
// Variant 2 — Overlap cascade (tighter, more editorial)
// ───────────────────────────────────────────────────────────────
function Variant2() {
  React.useEffect(() => { setTimeout(() => window.lucide?.createIcons(), 50); });
  return (
    <div className="banner" id="banner">
      <div className="grain" />

      {/* Large wordmark watermark */}
      <div style={{
        position:'absolute', bottom:-40, left:'50%', transform:'translateX(-50%)',
        fontFamily:"'Geist',Inter", fontWeight:300, fontSize:360,
        letterSpacing:'0.12em', color:'rgba(26,107,181,0.08)',

      }}>ALETHEIA</div>

      {/* Top nav */}
      <div style={{
        position:'absolute', top:56, left:0, right:0, padding:'0 80px',
        display:'flex', justifyContent:'space-between', alignItems:'center',
      }}>
        <span style={{ fontFamily:"'Geist',Inter", fontWeight:300, fontSize:22, letterSpacing:'0.32em', color:'#1A6BB5' }}>ALETHEIA</span>

// ───────────────────────────────────────────────────────────────
// App — scales stage to viewport
// ───────────────────────────────────────────────────────────────
function App() {
  const [v, setV] = React.useState(1);
  const scale = useScaleToFit(1920, 40);

  React.useEffect(() => {
    const b1 = document.getElementById('v1');
    const b2 = document.getElementById('v2');
    b1.onclick = () => { setV(1); b1.classList.add('on'); b2.classList.remove('on'); };
    b2.onclick = () => { setV(2); b2.classList.add('on'); b1.classList.remove('on'); };
  }, []);

  return (
    <div style={{
      width:1920, height:1080,
      transform:`scale(${scale})`, transformOrigin:'top center',
      marginBottom: 1080*(1-scale) * -1 + (1080 * scale - 1080), // absorb space
    }}>
      {v === 1 ? <Variant1 /> : <Variant2 />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
